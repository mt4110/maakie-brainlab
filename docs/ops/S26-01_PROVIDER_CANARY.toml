schema_version = "s26-provider-canary-v1"

[provider]
id = "openai-compatible-canary"
base_url_env = "S26_PROVIDER_BASE_URL"
api_key_env = "S26_PROVIDER_API_KEY"
model_env = "S26_PROVIDER_MODEL"
path = "/v1/chat/completions"

[policy]
timeout_sec = 15
max_retries = 2
retry_backoff_ms = 400
jitter_ms = 0
circuit_open_sec = 20
max_inflight = 1
retryable_reason_codes = ["TIMEOUT", "NETWORK_ERROR", "HTTP_429", "HTTP_5XX"]
non_retryable_reason_codes = ["AUTH_ERROR", "HTTP_4XX", "BAD_RESPONSE", "ASSERTION_FAILED"]

[rollback]
command = "python3 scripts/ops/s25_langchain_poc.py --mode rollback-only"

[[cases]]
id = "canary_ping"
prompt = "Return exactly: pong"
expect_substring = "pong"
must_pass = true

[[cases]]
id = "canary_citation"
prompt = "Return exactly: deterministic-citation-ok"
expect_substring = "deterministic-citation-ok"
must_pass = true
