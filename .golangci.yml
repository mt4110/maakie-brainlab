version: "2"

run:
  timeout: 5m
  issues-exit-code: 0

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - gofmt
    - goimports

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/maakie-brainlab

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
