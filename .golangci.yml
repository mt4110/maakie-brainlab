version: "2"

run:
  timeout: 5m
  # 初期は “警告” として扱う（CIを落とさない）
  issues-exit-code: 0

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - gofmt
    - goimports

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        # go.mod が `module reviewpack` なので合わせる
        - reviewpack

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
