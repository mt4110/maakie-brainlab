services:
  rag-dev:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - rag_sqlite_data:/workspace/.local/rag_sqlite
    environment:
      RAG_DB_BACKEND: sqlite
      RAG_SQLITE_DB_PATH: /workspace/.local/rag_sqlite/index.sqlite3
      # RAG_DB_BACKEND: postgres
      # RAG_POSTGRES_DSN: postgresql://brainlab:brainlab@postgres:5432/brainlab
    command: ["bash", "-lc", "sleep infinity"]
