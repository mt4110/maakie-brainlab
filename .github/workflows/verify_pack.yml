name: Verify Pack

on:
  push:
    branches: ["main", "s7-*"]
  pull_request:
    branches: ["main"]

jobs:
  verify-pack:
    runs-on: ubuntu-latest
    env:
      GATE1_VERIFY_ONLY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      # S7-01: GPG Key Generation (Ephemeral for CI)
      - name: Generate Ephemeral Keys
        run: |
          KEYDIR="$(mktemp -d)"
          pushd "$KEYDIR" >/dev/null
          # Create dummy keys (or real ones if needed, but in tmp)
          go run "$GITHUB_WORKSPACE/cmd/gopsign/main.go" -mode=keygen -id="CI Builder"
          popd >/dev/null

          echo "S6_SIGNING_KEY=$KEYDIR/privkey.asc" >> "$GITHUB_ENV"
          echo "S6_VERIFY_KEY=$KEYDIR/pubkey.asc" >> "$GITHUB_ENV"

      # S5: Evidence Pack (Clean Execution)
      - name: Create Evidence Pack
        id: create_evidence_pack
        shell: bash
        run: |
          set +e
          TMPDIR="$(mktemp -d)"

          # Run make s5 without polluting repo with ci_out yet
          make s5 2>&1 | tee "$TMPDIR/verify_pack.log"
          EXIT_CODE=${PIPESTATUS[0]}

          set -e
          mkdir -p ci_out
          cp "$TMPDIR/verify_pack.log" ci_out/verify_pack.log || true

          # Save Gate-1 log if exists (copy latest)
          echo "Searching for gate1 logs..."
          ls -1t .local/reviewpack_artifacts/gate1.*.log 2>/dev/null | head -n 1 \
            | xargs -I {} cp {} ci_out/gate1.log || echo "No gate1 log found"

          # Create artifact upload manifest
          {
            echo "Artifacts to upload:"
            echo "== ci_out =="
            ls -R ci_out
            echo "== .local/reviewpack_artifacts =="
            ls -R .local/reviewpack_artifacts 2>/dev/null || true
          } > ci_out/artifact_upload.log

          exit "$EXIT_CODE"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: verify-pack-logs-${{ github.run_id }}-${{ github.sha }}
          path: |
            ci_out/
            .local/reviewpack_artifacts/

      # Review Bundle
      - name: Create Review Bundle
        run: |
          go run cmd/reviewpack/main.go cmd/reviewpack/sign.go pack -sign-key="$S6_SIGNING_KEY"

      # Verification (Unified)
      - name: Verify Evidence Pack
        run: |
          PACK=$(ls -t .local/reviewpack_artifacts/evidence_pack_*.tar.gz | head -n 1)
          make verify-pack PACK="$PACK"

      - name: Verify Review Bundle
        run: |
          PACK=$(ls -t review_bundle_*.tar.gz | head -n 1)
          make verify-pack PACK="$PACK"
