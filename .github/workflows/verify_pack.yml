name: Verify Pack

on:
  push:
    branches: ["main", "s7-*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      inject_failure:
        description: "Inject failure (none|doclinks|seed-missing)"
        required: false
        default: "none"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read



jobs:
  verify-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      GATE1_VERIFY_ONLY: "1"
      S5_MODE: "verify-only"
      REVIEWPACK_POLICY_MODE: "ci"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanity Check (Finalize Clean)
        run: bash ops/finalize_clean.sh --check

      - name: Init CI (Run Always)
        run: |
          mkdir -p .local/ci
          date -u +"%Y%m%dT%H%M%SZ" > .local/ci/00_utc.txt
          echo "sha=$(git rev-parse HEAD)" > .local/ci/00_meta.txt
          echo "run_id=${{ github.run_id }}" >> .local/ci/00_meta.txt
          
          # Failure Injection: doclinks (v3 Robust)
          if [ "${{ inputs.inject_failure }}" == "doclinks" ]; then
             echo "[INJECT] doclinks: patching README.md (tracked) for scan..."
             # Inject multiple forbidden patterns to ensure detection (Obfuscated from linter)
             PROTO="file"
             PROTO="${PROTO}://"
             printf "\n<!-- INJECT_DOC_LINKS_BEGIN -->\n[file-url](${PROTO}/INJECT_DO_NOT_OPEN)\n${PROTO}/INJECT_DO_NOT_OPEN\n${PROTO}localhost/INJECT_DO_NOT_OPEN\n${PROTO}/INJECT_DO_NOT_OPEN\n<!-- INJECT_DOC_LINKS_END -->\n" >> README.md
             # Check if injection worked
             grep -n "INJECT_DO_NOT_OPEN" README.md || true
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create venv & Install Deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          # Diagnostics
          .venv/bin/python -c "import feedparser; print('feedparser ok')"
          echo "pip freeze (head):"
          .venv/bin/pip freeze | head -n 40

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # S7-01: GPG Key Generation (Ephemeral for CI)
      # S7-01: GPG Key Generation (Ephemeral for CI)
      - name: Generate Ephemeral Keys
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          KEYDIR="$(mktemp -d)"
          echo "KEYDIR=$KEYDIR" >> "$GITHUB_ENV"

          # Run from module root so go.mod is found
          # Keys output to /tmp (clean workspace)
          go run ./cmd/gopsign/main.go -mode=keygen -id="CI Builder" -out-dir "$KEYDIR"

          test -s "$KEYDIR/privkey.asc"
          test -s "$KEYDIR/pubkey.asc"

          echo "S6_SIGNING_KEY=$KEYDIR/privkey.asc" >> "$GITHUB_ENV"
          echo "S6_VERIFY_KEY=$KEYDIR/pubkey.asc" >> "$GITHUB_ENV"

          # Diagnostics
          echo "pwd=$(pwd)"
          echo "go env GOMOD=$(go env GOMOD)"
          git status --porcelain=v1 || true
          ls -la "$KEYDIR"

      # S5: Seed eval results fixture (CI)
      # S5: Seed eval results fixture (CI)
      # S5: Seed eval results fixture (CI)
      - name: Seed eval results fixture (CI)
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set +e
          {
            set -euo pipefail
            
            # Failure Injection: seed-missing
            if [ "${{ inputs.inject_failure }}" == "seed-missing" ]; then
              echo "[INJECT] Simulating missing seed by skipping seed logic or corrupting it"
              # Just intentionally fail the seed check later or rename if exists
              find eval/results -name "*.jsonl" -delete || true
            fi
            
            # CI checkout には eval/results が無い（gitignore）ので、fixture から投入して verify-only を安定させる
            FIX="eval/fixtures/latest.jsonl"
            test -s "$FIX" || { echo "[FAIL] Missing fixture: $FIX (must be committed)"; exit 1; }

            mkdir -p eval/results

            # verify-only が要求する「latest 以外の .jsonl」を用意（名前固定で決定論）
            if [ ! -f eval/results/ci.jsonl ]; then
              cp -f "$FIX" eval/results/ci.jsonl
              echo "[OK] Seeded eval/results/ci.jsonl from $FIX"
            else
              echo "[OK] eval/results/ci.jsonl already exists"
            fi
            
            # Use 'seed-eval' logic if available (future proofing)
            # make seed-eval || true

            # Sanity
            ls -la eval/results
          } 2>&1 | tee .local/ci/seed_eval.log
          
          # Capture status
          ec=${PIPESTATUS[0]}
          echo -e "seed_eval\t$ec" >> .local/ci/10_status.tsv
          exit 0

      # S5: Evidence Pack (Clean Execution)
      - name: Create Evidence Pack (Clean Workspace & Run Always)
        id: create_evidence_pack
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set +e
          TMPDIR="$(mktemp -d)"

          # Run make s5 without polluting repo with ci_out yet
          # Redirect standard error to stdout to capture everything in the log
          make s5 2>&1 | tee "$TMPDIR/verify_pack.log"
          EXIT_CODE=${PIPESTATUS[0]}

          set -e
          mkdir -p ci_out
          cp "$TMPDIR/verify_pack.log" ci_out/verify_pack.log || true

          # Save Gate-1 log if exists (copy latest)
          ls -1t .local/reviewpack_artifacts/gate1.*.log 2>/dev/null | head -n 1 \
            | xargs -I {} cp {} ci_out/gate1.log || echo "No gate1 log found" > ci_out/gate1.log

          # Observability (S7-20)
          echo "== verify_pack.log (tail 120) =="
          tail -n 120 ci_out/verify_pack.log || true

          # Create artifact upload manifest & Diagnostics
          {
            echo "== preflight =="
            echo "date=$(date -u)"
            echo "pwd=$(pwd)"
            echo "git_root=$(git rev-parse --show-toplevel 2>/dev/null || echo '-')"
            echo "git_status:"
            git status --porcelain=v1 || true
            echo "go env GOMOD=$(go env GOMOD 2>/dev/null || echo '-')"
            echo "python=$(python -V 2>&1 || true)"
            echo "venv_python=$(.venv/bin/python -V 2>&1 || echo 'missing')"
            echo "pip freeze:"
            .venv/bin/pip freeze | head -n 20
            echo
            echo "== ci_out tree =="
            ls -R ci_out || true
            echo
            echo "== .local/reviewpack_artifacts tree =="
            ls -R .local/reviewpack_artifacts 2>/dev/null || true
          } > ci_out/artifact_upload.log
          
          cp ci_out/artifact_upload.log ci_out/diagnostics.txt

          # Capture status (Run Always)
          echo -e "s5_evidence_pack\t$EXIT_CODE" >> .local/ci/10_status.tsv
          cp "$TMPDIR/verify_pack.log" .local/ci/s5_evidence_pack.log || true
          exit 0


      # Review Bundle (Run Always Wrap)
      - name: Create Review Bundle
        run: |
          set +e
          {
            set -euo pipefail
            go run ./cmd/reviewpack/main.go submit --mode verify-only
            PACK=$(ls -t review_bundle_*.tar.gz | head -n 1)
            test -s "$PACK"
            echo "[OK] Created: $PACK"
            go run ./cmd/gopsign/main.go -mode=sign -key="$S6_SIGNING_KEY" -target="$PACK"
            test -s "$PACK.asc"
            echo "[OK] Signed: $PACK.asc"
          } 2>&1 | tee .local/ci/review_bundle.log
          ec=${PIPESTATUS[0]}
          echo -e "review_bundle\t$ec" >> .local/ci/10_status.tsv
          exit 0

      # Verification (Unified) (Run Always Wrap)
      - name: Verify Evidence Pack
        run: |
          set +e
          {
             PACK=$(ls -t .local/reviewpack_artifacts/evidence_pack_*.tar.gz | head -n 1)
             make verify-pack PACK="$PACK"
          } 2>&1 | tee .local/ci/verify_evidence.log
          ec=${PIPESTATUS[0]}
          echo -e "verify_evidence\t$ec" >> .local/ci/10_status.tsv
          exit 0

      - name: Verify Review Bundle
        run: |
          set +e
          {
             PACK=$(ls -t review_bundle_*.tar.gz | head -n 1)
             make verify-pack PACK="$PACK"
          } 2>&1 | tee .local/ci/verify_bundle.log
          ec=${PIPESTATUS[0]}
          echo -e "verify_bundle\t$ec" >> .local/ci/10_status.tsv
          exit 0

      - name: Check Doc Links
        run: |
          set +e
          # Debug recipe (v3)
          make -n check-doc-links > .local/ci/21_doclinks_recipe.txt 2>&1 || true
          
          make check-doc-links 2>&1 | tee .local/ci/doc_links.log
          ec=${PIPESTATUS[0]}
          
          # Fail Safe for Injection (v3)
          if [ "${{ inputs.inject_failure }}" == "doclinks" ] && [ "$ec" -eq 0 ]; then
             echo "[INJECT][ERROR] doclinks injection did NOT trigger failure; marking doc_links as invalid test (ec=99)" | tee -a .local/ci/doc_links.log
             ec=99
          fi

          echo -e "doc_links\t$ec" >> .local/ci/10_status.tsv
          
          # Restore README if injected (Best effort cleanup in CI, though runner cleans workspace)
          if [ "${{ inputs.inject_failure }}" == "doclinks" ]; then
             git restore -- README.md || true
          fi
          
          exit 0

      # Summary & Upload (Run Always)
      - name: CI Summary
        if: always()
        run: |
           CI_DIR=".local/ci"
           SUMMARY_MD="${CI_DIR}/summary.md"
           SUMMARY_JSONL="${CI_DIR}/summary.jsonl"
           STATUS_FILE="${CI_DIR}/10_status.tsv"
           
           # 1. Generate summary.md (Human)
           echo "## Run Always Summary: ${{ github.run_number }}-${{ github.sha }}" > "$SUMMARY_MD"
           echo "" >> "$SUMMARY_MD"
           echo "- **Time (UTC)**: $(cat ${CI_DIR}/00_utc.txt 2>/dev/null || date -u)" >> "$SUMMARY_MD"
           echo "- **Git SHA**: ${{ github.sha }}" >> "$SUMMARY_MD"
           
           STATUS="FAIL"
           if [ -f "$STATUS_FILE" ] && awk '$2 != 0 {exit 1}' "$STATUS_FILE"; then
               STATUS="PASS"
           fi
           echo "- **Result**: ${STATUS}" >> "$SUMMARY_MD"
           echo "" >> "$SUMMARY_MD"
           
           echo "### Checks" >> "$SUMMARY_MD"
           echo "| Step | Status |" >> "$SUMMARY_MD"
           echo "|---|---|" >> "$SUMMARY_MD"
           if [ -f "$STATUS_FILE" ]; then
               while read -r name code; do
                   verdict="PASS"
                   if [ "$code" != "0" ]; then verdict="FAIL ($code)"; fi
                   echo "| $name | $verdict |" >> "$SUMMARY_MD"
               done < "$STATUS_FILE"
           else
               echo "| (No status file) | - |" >> "$SUMMARY_MD"
           fi
           
           echo "" >> "$SUMMARY_MD"
           echo "### Artifacts" >> "$SUMMARY_MD"
           echo "- [Log Directory](.)" >> "$SUMMARY_MD"
           ls -1 "${CI_DIR}" | grep "\.log$" | sed 's/^/- /' >> "$SUMMARY_MD"
           
           echo "" >> "$SUMMARY_MD"
           echo "### Next Action" >> "$SUMMARY_MD"
           if [ "$STATUS" == "PASS" ]; then
               echo "No action required." >> "$SUMMARY_MD"
           else
               echo "Investigate failures in logs." >> "$SUMMARY_MD"
           fi
           
           # 2. Output to Job Summary (Append)
           cat "$SUMMARY_MD" >> $GITHUB_STEP_SUMMARY
           
           # 3. Generate summary.jsonl (Machine)
           python3 -c "
           import json
           import os
           try:
               checks = []
               status_file = '${STATUS_FILE}'
               if os.path.exists(status_file):
                   with open(status_file) as f:
                       for line in f:
                           parts = line.strip().split('\t')
                           if len(parts) >= 2:
                               checks.append({'name': parts[0], 'code': int(parts[1])})
               data = {
                   'timestamp_utc': '$(cat ${CI_DIR}/00_utc.txt 2>/dev/null || date -u)',
                   'run_id': '${{ github.run_id }}',
                   'git_sha': '${{ github.sha }}',
                   'status': '${STATUS}',
                   'checks': checks,
                   'artifacts': [f for f in os.listdir('${CI_DIR}') if f.endswith('.log') or f.endswith('.md')]
               }
               print(json.dumps(data))
           except Exception as e:
               print(json.dumps({'error': str(e)}))
           " > "$SUMMARY_JSONL"
           
           # Show failures in Job Summary
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "### Failure Logs (Tail)" >> $GITHUB_STEP_SUMMARY
           if [ -f "$STATUS_FILE" ]; then
             cat "$STATUS_FILE" | awk '$2 != 0 {print $1}' | while read -r name; do
               logfile="${CI_DIR}/${name}.log"
               if [ -f "$logfile" ]; then
                 echo "<details><summary>Log: $name</summary>" >> $GITHUB_STEP_SUMMARY
                 echo "" >> $GITHUB_STEP_SUMMARY
                 echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                 tail -n 80 "$logfile" >> $GITHUB_STEP_SUMMARY
                 echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                 echo "" >> $GITHUB_STEP_SUMMARY
                 echo "</details>" >> $GITHUB_STEP_SUMMARY
               fi
             done
           fi

      - name: Upload Artifacts (Run Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: run-always-${{ github.run_number }}-${{ github.sha }}
          path: |
            .local/ci/
            ci_out/
            review_bundle_*.tar.gz
          retention-days: 14

      - name: Check Workspace Dirtiness
        if: always()
        run: |
          echo "Checking for unexpected workspace mutations..."
          # Fail if tracked files are modified (Mode M, A, D, etc. in first column area)
          # Porcelain v1: XY Path. X=Index, Y=Worktree.
          # If Y is not space? Or just grep anything that isn't "??"
          
          # Allow untracked in .local/
          # Fail everything else.
          
          STATUS=$(git status --porcelain=v1)
          if [ -z "$STATUS" ]; then
            echo "[PASS] Workspace clean"
            exit 0
          fi
          
          # Check for non-untracked (modified/added/deleted in index or worktree)
          # grep -v "^??" checks if there are lines NOT starting with ??
          if echo "$STATUS" | grep -v "^??"; then
             echo "[FAIL] Tracked files modified or staged:"
             echo "$STATUS" | grep -v "^??"
             exit 1
          fi
          
          # Check for untracked outside .local/
          # Filter out lines starting with "?? .local/"
          UNKNOWN=$(echo "$STATUS" | grep "^??" | grep -v "^?? .local/") || true
          if [ -n "$UNKNOWN" ]; then
             echo "[FAIL] Untracked files detected outside .local/:"
             echo "$UNKNOWN"
             exit 1
          fi
          
          echo "[PASS] Workspace clean (ignoring .local/)"

      - name: Final Aggregation
        if: always()
        run: |
          if [ -f .local/ci/10_status.tsv ]; then
             # If any exit code is not 0, fail the job
             if awk '$2 != 0 {exit 1}' .local/ci/10_status.tsv; then
                echo "[PASS] All steps passed"
                exit 0
             else
                echo "[FAIL] Failures detected in Run Always steps"
                exit 1
             fi
          else
             echo "[FAIL] No status file found!"
             exit 1
          fi
