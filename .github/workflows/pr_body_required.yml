name: PR Body Required
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  body_required:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run PR Body Fix logic (Go)
        if: github.actor != 'github-actions[bot]' || github.event_name != 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/prbodyfix
