name: PR Body Required
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  body_required:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sentinel = 'PR_BODY_TEMPLATE_v1:';

            const getTemplate = async () => {
              const res = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/pull_request_template.md',
                ref: pr.base.sha,
              });
              if (!res || !res.data || !res.data.content) {
                throw new Error('pull_request_template.md content missing');
              }
              const enc = res.data.encoding || 'base64';
              return Buffer.from(res.data.content, enc).toString('utf8');
            };

            const normalizeTemplate = (raw) => {
              return raw
                .split('\n')
                .filter((line) => !line.includes(sentinel))
                .join('\n')
                .trim();
            };

            let body = (pr && pr.body) ? pr.body : '';
            let trimmed = body.trim();

            // Auto-fill if empty
            if (trimmed.length === 0) {
              const rawTpl = await getTemplate();
              const filled = normalizeTemplate(rawTpl);

              if (filled.length === 0) {
                core.setFailed('PR body is empty and template becomes empty after stripping sentinel.');
                return;
              }

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: filled + '\n',
              });

              core.info('PR body was empty; auto-filled from pull_request_template.md (sentinel stripped).');
              trimmed = filled;
            }

            // Existing checks
            if (trimmed.length === 0) {
              core.setFailed('PR body is empty. Fill the description before merge.');
              return;
            }
            if (trimmed.includes(sentinel)) {
              core.setFailed('PR body is still the template. Edit/remove the template marker before merge.');
              return;
            }
