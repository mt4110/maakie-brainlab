name: PR Body Required
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  body_required:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr && pr.body) ? pr.body : '';
            const trimmed = body.trim();
            const sentinel = 'PR_BODY_TEMPLATE_v1:';

            if (trimmed.length === 0) {
              core.setFailed('PR body is empty. Fill the description before merge.');
              return;
            }
            if (trimmed.includes(sentinel)) {
              core.setFailed('PR body is still the template. Edit/remove the template marker before merge.');
              return;
            }
