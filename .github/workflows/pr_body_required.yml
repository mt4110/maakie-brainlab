name: PR Body Required
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  body_required:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.head.repo.full_name !== context.repo.owner + '/' + context.repo.repo) {
              core.info('Fork PR detected. Skipping body check due to permissions.');
              return;
            }

            const sentinel = 'PR_BODY_TEMPLATE_v1:';

            const getTemplate = async () => {
              try {
                const res = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: '.github/pull_request_template.md',
                  ref: pr.base.sha,
                });
                if (!res || !res.data || !res.data.content) {
                   return '';
                }
                const enc = res.data.encoding || 'base64';
                return Buffer.from(res.data.content, enc).toString('utf8');
              } catch (e) {
                core.warning('Failed to fetch pull_request_template.md: ' + e);
                return '';
              }
            };

            const cleanBody = (raw) => {
              if (!raw) return '';
              return raw
                .split('\n')
                .filter((line) => !line.includes(sentinel))
                .join('\n')
                .trim();
            };

            let currentBody = pr.body || '';
            let cleaned = cleanBody(currentBody);
            let needsUpdate = false;

            // Rule 1: Remove sentinel if present
            if (currentBody !== cleaned) {
               core.info('Sentinel detected in body. Removing...');
               needsUpdate = true;
               currentBody = cleaned;
            }

            // Rule 2: If empty, fill from template (clean)
            if (currentBody.length === 0) {
              core.info('Body is empty. Fetching template...');
              const rawTpl = await getTemplate();
              const filled = cleanBody(rawTpl);
              if (filled.length > 0) {
                 currentBody = filled;
                 needsUpdate = true;
              } else {
                 core.setFailed('PR body is empty and template unavailable or empty.');
                 return;
              }
            }

            if (needsUpdate) {
               await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  body: currentBody + '\n', // ensure trailing newline
               });
               core.info('PR body updated successfully.');
            } else {
               core.info('PR body satisfies requirements.');
            }
