name: milestone_autofill

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read
  issues: write
  actions: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Autofill milestone if missing (truth over payload)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const core = require("@actions/core");

            async function run() {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const prNumber = context.payload.pull_request?.number;

              if (!prNumber) {
                core.notice("SKIP: no PR number in payload");
                return;
              }

              // Always fetch current PR state (avoid stale payload)
              let pr;
              try {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              } catch (e) {
                core.warning(`ERROR: pulls.get failed (non-fatal): ${e?.message || e}`);
                return;
              }

              const current = pr.milestone?.title || "";
              const headRef = pr.head?.ref || "";
              const title = pr.title || "";

              if (current) {
                core.notice(`SKIP: milestone already set: ${current}`);
                return;
              }

              // Infer Sxx from head branch or title: s21-04-... / (S21-04) / S21 ...
              const hay = `${headRef} ${title}`;
              const mm = hay.match(/(?:^|[^A-Za-z0-9])s(\d{1,2})(?:[-_]\d{2})?(?:[^A-Za-z0-9]|$)/i)
                      || hay.match(/(?:^|[^A-Za-z0-9])S(\d{1,2})(?:[-_]\d{2})?(?:[^A-Za-z0-9]|$)/);

              if (!mm) {
                core.notice(`SKIP: cannot infer milestone from headRef/title: headRef="${headRef}" title="${title}"`);
                return;
              }

              const n = parseInt(mm[1], 10);
              if (!Number.isFinite(n) || n <= 0) {
                core.notice(`SKIP: invalid inferred milestone number: ${mm[1]}`);
                return;
              }

              const want = `S${String(n).padStart(2, "0")}`; // S21 etc.

              // Find milestone by title (open milestones)
              let milestones = [];
              try {
                milestones = (await github.rest.issues.listMilestones({
                  owner, repo,
                  state: "open",
                  per_page: 100,
                })).data || [];
              } catch (e) {
                core.warning(`ERROR: listMilestones failed (non-fatal): ${e?.message || e}`);
                return;
              }

              const target = milestones.find(x => (x.title || "") === want)
                          || milestones.find(x => (x.title || "").startsWith(want));

              if (!target) {
                core.notice(`SKIP: milestone not found: want="${want}" (create milestone first)`);
                return;
              }

              // Milestone is updated via Issues API (PR is an issue)
              try {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: prNumber,
                  milestone: target.number,
                });
                core.notice(`OK: milestone set: ${want} (#${target.number})`);
              } catch (e) {
                core.warning(`ERROR: issues.update failed (non-fatal): ${e?.message || e}`);
                return;
              }
            }

            run().catch(e => core.warning(`ERROR: unexpected (non-fatal): ${e?.message || e}`));

      - name: Dispatch milestone_required (refresh required check)
        id: dispatch_milestone_required
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo;

            let dispatchOk = "0";
            let dispatchErr = "";
            let prNumberStr = "";
            let headSha = "";

            try {
              const prNumber = context.payload.pull_request?.number ?? null;
              if (!prNumber) {
                core.info("SKIP: no pull_request number");
                core.setOutput("dispatch_ok", dispatchOk);
                core.setOutput("dispatch_error", "SKIP: no pull_request number");
                core.setOutput("pr_number", "");
                core.setOutput("head_sha", "");
                return;
              }
              prNumberStr = String(prNumber);

              const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              headSha = pr.data?.head?.sha ?? "";
              if (!headSha) {
                core.info(`ERROR: dispatch skipped (no head sha) pr=${prNumberStr}`);
                core.setOutput("dispatch_ok", dispatchOk);
                core.setOutput("dispatch_error", "ERROR: no head sha");
                core.setOutput("pr_number", prNumberStr);
                core.setOutput("head_sha", headSha);
                return;
              }

              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: "milestone_required.yml",
                ref: headSha,
                inputs: { pr_number: prNumberStr },
              });

              dispatchOk = "1";
              core.info(`OK: dispatched milestone_required pr=${prNumberStr} ref=${headSha}`);
            } catch (e) {
              const status = (e && (e.status || e.response?.status)) ? String(e.status || e.response?.status) : "NA";
              const msg = (e && e.message) ? e.message : String(e);
              dispatchErr = `status=${status} msg=${msg}`.slice(0, 360);
              core.info(`ERROR: dispatch milestone_required failed pr=${prNumberStr || "NA"} ref=${headSha || "NA"} ${dispatchErr}`);
            }

            core.setOutput("dispatch_ok", dispatchOk);
            core.setOutput("dispatch_error", dispatchErr);
            core.setOutput("pr_number", prNumberStr);
            core.setOutput("head_sha", headSha);

      - name: Audit dispatch result (one-line)
        if: always()
        run: |
          OK="${{ steps.dispatch_milestone_required.outputs.dispatch_ok }}"
          PR="${{ steps.dispatch_milestone_required.outputs.pr_number }}"
          SHA="${{ steps.dispatch_milestone_required.outputs.head_sha }}"
          ERR="${{ steps.dispatch_milestone_required.outputs.dispatch_error }}"

          if [ "$OK" = "1" ]; then
            LINE="OK: milestone_autofill dispatch milestone_required pr=${PR:-NA} ref=${SHA:-NA}"
            echo "$LINE"
            printf "%s\n" "$LINE" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          else
            LINE="ERROR: milestone_autofill dispatch milestone_required failed pr=${PR:-NA} ref=${SHA:-NA} ${ERR:-NA}"
            echo "$LINE"
            printf "%s\n" "$LINE" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi
