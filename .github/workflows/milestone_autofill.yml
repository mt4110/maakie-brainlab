name: milestone_autofill

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read
  issues: write
  actions: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Autofill milestone if missing (truth over payload)
        id: autofill
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const core = require("@actions/core");
            let prNumberStr = "";
            let headRef = "";
            let dispatchNeeded = "0";
            let autofillStatus = "skip";
            let autofillDetail = "";

            function flushOutputs() {
              core.setOutput("pr_number", prNumberStr);
              core.setOutput("head_ref", headRef);
              core.setOutput("dispatch_needed", dispatchNeeded);
              core.setOutput("autofill_status", autofillStatus);
              core.setOutput("autofill_detail", autofillDetail.slice(0, 360));
            }

            async function run() {
              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const prNumber = context.payload.pull_request?.number;

              if (!prNumber) {
                autofillDetail = "SKIP: no PR number in payload";
                core.notice(autofillDetail);
                flushOutputs();
                return;
              }
              prNumberStr = String(prNumber);

              // Always fetch current PR state (avoid stale payload)
              let pr;
              try {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              } catch (e) {
                autofillStatus = "error";
                autofillDetail = `ERROR: pulls.get failed (non-fatal): ${e?.message || e}`;
                core.warning(autofillDetail);
                flushOutputs();
                return;
              }

              const current = pr.milestone?.title || "";
              headRef = pr.head?.ref || "";
              const title = pr.title || "";

              if (current) {
                autofillDetail = `SKIP: milestone already set: ${current}`;
                core.notice(autofillDetail);
                flushOutputs();
                return;
              }

              // Infer Sxx from head branch or title: s21-04-... / (S21-04) / S21 ...
              const hay = `${headRef} ${title}`;
              const mm = hay.match(/(?:^|[^A-Za-z0-9])s(\d{1,2})(?:[-_]\d{2})?(?:[^A-Za-z0-9]|$)/i)
                      || hay.match(/(?:^|[^A-Za-z0-9])S(\d{1,2})(?:[-_]\d{2})?(?:[^A-Za-z0-9]|$)/);

              if (!mm) {
                autofillDetail = `SKIP: cannot infer milestone from headRef/title: headRef="${headRef}" title="${title}"`;
                core.notice(autofillDetail);
                flushOutputs();
                return;
              }

              const n = parseInt(mm[1], 10);
              if (!Number.isFinite(n) || n <= 0) {
                autofillDetail = `SKIP: invalid inferred milestone number: ${mm[1]}`;
                core.notice(autofillDetail);
                flushOutputs();
                return;
              }

              const want = `S${String(n).padStart(2, "0")}`; // S21 etc.

              // Find milestone by title (open milestones)
              let milestones = [];
              try {
                milestones = (await github.rest.issues.listMilestones({
                  owner, repo,
                  state: "open",
                  per_page: 100,
                })).data || [];
              } catch (e) {
                autofillStatus = "error";
                autofillDetail = `ERROR: listMilestones failed (non-fatal): ${e?.message || e}`;
                core.warning(autofillDetail);
                flushOutputs();
                return;
              }

              const target = milestones.find(x => (x.title || "") === want)
                          || milestones.find(x => (x.title || "").startsWith(want));

              if (!target) {
                autofillDetail = `SKIP: milestone not found: want="${want}" (create milestone first)`;
                core.notice(autofillDetail);
                flushOutputs();
                return;
              }

              // Milestone is updated via Issues API (PR is an issue)
              try {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: prNumber,
                  milestone: target.number,
                });
                dispatchNeeded = "1";
                autofillStatus = "ok";
                autofillDetail = `OK: milestone set: ${want} (#${target.number})`;
                core.notice(autofillDetail);
              } catch (e) {
                autofillStatus = "error";
                autofillDetail = `ERROR: issues.update failed (non-fatal): ${e?.message || e}`;
                core.warning(autofillDetail);
                flushOutputs();
                return;
              }

              flushOutputs();
            }

            await run().catch(e => {
              core.warning(`ERROR: unexpected (non-fatal): ${e?.message || e}`);
              try {
                if (typeof flushOutputs === "function") {
                  flushOutputs();
                }
              } catch (flushError) {
                core.warning(`ERROR: failed to flush outputs after unexpected error: ${flushError?.message || flushError}`);
              }
            });

      - name: Dispatch milestone_required (refresh required check)
        id: dispatch_milestone_required
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          DISPATCH_NEEDED: ${{ steps.autofill.outputs.dispatch_needed }}
          PR_NUMBER: ${{ steps.autofill.outputs.pr_number }}
          HEAD_REF: ${{ steps.autofill.outputs.head_ref }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const dispatchNeeded = (process.env.DISPATCH_NEEDED || "0").trim();
            let dispatchState = "skip";
            let dispatchErr = "";
            let prNumberStr = (process.env.PR_NUMBER || "").trim();
            let headRef = (process.env.HEAD_REF || "").trim();

            try {
              if (dispatchNeeded !== "1") {
                dispatchErr = "SKIP: dispatch not needed";
                core.info(dispatchErr);
                core.setOutput("dispatch_state", dispatchState);
                core.setOutput("dispatch_error", dispatchErr);
                core.setOutput("pr_number", prNumberStr);
                core.setOutput("head_ref", headRef);
                return;
              }

              if (!prNumberStr || !headRef) {
                dispatchState = "error";
                dispatchErr = "ERROR: missing pr_number/head_ref for dispatch";
                core.info(`${dispatchErr} pr=${prNumberStr || "NA"} ref=${headRef || "NA"}`);
                core.setOutput("dispatch_state", dispatchState);
                core.setOutput("dispatch_error", dispatchErr);
                core.setOutput("pr_number", prNumberStr);
                core.setOutput("head_ref", headRef);
                return;
              }

              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: "milestone_required.yml",
                ref: headRef,
                inputs: { pr_number: prNumberStr },
              });

              dispatchState = "ok";
              core.info(`OK: dispatched milestone_required pr=${prNumberStr} ref=${headRef}`);
            } catch (e) {
              dispatchState = "error";
              const status = (e && (e.status || e.response?.status)) ? String(e.status || e.response?.status) : "NA";
              const msg = (e && e.message) ? e.message : String(e);
              dispatchErr = `status=${status} msg=${msg}`.slice(0, 360);
              core.info(`ERROR: dispatch milestone_required failed pr=${prNumberStr || "NA"} ref=${headRef || "NA"} ${dispatchErr}`);
            }

            core.setOutput("dispatch_state", dispatchState);
            core.setOutput("dispatch_error", dispatchErr);
            core.setOutput("pr_number", prNumberStr);
            core.setOutput("head_ref", headRef);

      - name: Audit dispatch result (one-line)
        if: always()
        run: |
          STATE="${{ steps.dispatch_milestone_required.outputs.dispatch_state }}"
          PR="${{ steps.dispatch_milestone_required.outputs.pr_number }}"
          REF="${{ steps.dispatch_milestone_required.outputs.head_ref }}"
          ERR="${{ steps.dispatch_milestone_required.outputs.dispatch_error }}"

          if [ "$STATE" = "ok" ]; then
            LINE="OK: milestone_autofill dispatch milestone_required pr=${PR:-NA} ref=${REF:-NA}"
          elif [ "$STATE" = "skip" ]; then
            LINE="SKIP: milestone_autofill dispatch not needed pr=${PR:-NA} ref=${REF:-NA}"
          else
            LINE="ERROR: milestone_autofill dispatch milestone_required failed pr=${PR:-NA} ref=${REF:-NA} ${ERR:-NA}"
          fi
          echo "$LINE"
          printf "%s\n" "$LINE" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
