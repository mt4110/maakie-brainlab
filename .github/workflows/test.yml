name: Test

on:
  push:
    branches: ["main", "s7-*"]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bootstrap Canonical Environment
        run: make bootstrap

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Run Unit Tests
        run: make test

      - name: Required Checks Contract Guard
        run: python3 ops/ci/check_required_checks_contract.py

      - name: Run Smoke Test
        run: make smoke

      - name: Ensure no tracked files changed
        run: git diff --exit-code

      # Linting could be added here (e.g. golangci-lint)
      - name: Vet
        run: go vet ./...
